<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly Construction | 404 Not Found</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#facc15', // Yellow/Orange color from image
                        dark: '#1e293b',
                        darker: '#0f172a'
                    }
                }
            }
        }
    </script>

    <style>
        .nav-link.active {
            color: #facc15;
            position: relative;
        }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #facc15;
        }
    </style>
</head>
<body class="font-sans text-gray-800 antialiased bg-white flex flex-col min-h-screen">

    <!-- Navbar Section -->


    <!-- 404 Section -->
    <main class="flex-grow flex items-center justify-center relative w-full pt-20" style="background: linear-gradient(rgba(15,23,42,0.85), rgba(15,23,42,0.95)), url('https://images.unsplash.com/photo-1504307651254-35680f356f27?auto=format&fit=crop&fm=webp&q=80&w=2000'); background-size: cover; background-position: center; min-h-[70vh]">
        <div class="text-center text-white px-6">
            <div class="inline-block p-4 rounded-full bg-primary/20 mb-6 border border-primary/30 backdrop-blur-sm">
                <i class="fa-solid fa-triangle-exclamation text-5xl text-primary drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]"></i>
            </div>
            <h1 class="text-7xl md:text-9xl font-extrabold mb-4 tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white to-gray-400">404</h1>
            <h2 class="text-2xl md:text-4xl font-bold mb-6">Under Construction</h2>
            <p class="text-gray-300 max-w-lg mx-auto mb-10 text-base md:text-lg leading-relaxed">
                Oops! Looks like the page you are looking for has been demolished or is still in the blueprint phase. Let's get you back to safe grounds.
            </p>
            <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
                <button onclick="window.history.back()" class="inline-flex items-center gap-3 bg-transparent border-2 border-gray-400 text-white px-8 py-3.5 rounded-lg font-bold hover:bg-white hover:text-dark transition transform hover:-translate-y-1">
                    <i class="fa-solid fa-arrow-left"></i> Go Back
                </button>
                <a href="index.html" class="inline-flex items-center gap-3 bg-primary text-dark px-8 py-4 rounded-lg font-bold hover:bg-yellow-400 transition transform hover:-translate-y-1 shadow-[0_10px_20px_rgba(250,204,21,0.2)]">
                    <i class="fa-solid fa-house"></i> Homepage
                </a>
            </div>
        </div>
    </main>



    <script>
        // Check Auth state for Navbar
        document.addEventListener('DOMContentLoaded', () => {
            const storedData = localStorage.getItem('stackly_user');
            if (storedData) {
                const user = JSON.parse(storedData);
                const authBtn = document.getElementById('auth-btn');
                if (authBtn) {
                    if (user.role === 'admin') {
                        authBtn.href = 'admin-dashboard.html';
                        authBtn.innerHTML = '<i class="fa-solid fa-chart-pie"></i> Dashboard';
                    } else {
                        authBtn.href = 'user-dashboard.html';
                        authBtn.innerHTML = '<i class="fa-solid fa-table-columns"></i> Dashboard';
                    }
                }
            }
        });
    </script>
    <script src="scritp.js"></script>
</body>
</html>
